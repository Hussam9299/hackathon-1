<svg width="700" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Simulator (Gazebo/Unity) -->
  <rect x="50" y="50" width="150" height="100" fill="#add8e6" stroke="black"/>
  <text x="75" y="75" font-weight="bold">Simulator</text>
  <text x="75" y="95">(Gazebo/Unity)</text>
  
  <!-- Simulated Sensor -->
  <rect x="60" y="110" width="130" height="30" fill="#f0e68c" stroke="black"/>
  <text x="70" y="130">Simulated Sensor</text>

  <!-- ROS 2 Topic -->
  <ellipse cx="350" cy="100" rx="60" ry="30" fill="#90ee90" stroke="black"/>
  <text x="325" y="105">ROS 2 Topic</text>

  <!-- RViz2 -->
  <rect x="550" y="50" width="100" height="100" fill="#ffb6c1" stroke="black"/>
  <text x="570" y="75" font-weight="bold">RViz2</text>
  <text x="570" y="95">Visualization</text>

  <!-- Arrows -->
  <line x1="200" y1="100" x2="290" y2="100" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="90" fill="black">Publishes</text>

  <line x1="410" y1="100" x2="550" y2="100" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="90" fill="black">Subscribes</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
        markerWidth="6" markerHeight="6"
        orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>
</svg>