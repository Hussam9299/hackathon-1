<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Base Link -->
  <rect x="150" y="20" width="100" height="40" fill="#lightblue" stroke="black"/>
  <text x="170" y="45">base_link</text>

  <!-- Head -->
  <rect x="150" y="100" width="100" height="40" fill="#lightgreen" stroke="black"/>
  <text x="180" y="125">head</text>
  <line x1="200" y1="60" x2="200" y2="100" stroke="black"/>
  <text x="205" y="85">head_joint (fixed)</text>

  <!-- Right Arm -->
  <rect x="20" y="100" width="100" height="40" fill="#lightcoral" stroke="black"/>
  <text x="35" y="125">right_arm</text>
  <line x1="150" y1="40" x2="70" y2="100" stroke="black"/>
  <text x="75" y="65">right_arm_joint (revolute)</text>

  <!-- Left Arm -->
  <rect x="280" y="100" width="100" height="40" fill="#lightcoral" stroke="black"/>
  <text x="300" y="125">left_arm</text>
  <line x1="250" y1="40" x2="330" y2="100" stroke="black"/>
  <text x="255" y="65">left_arm_joint (revolute)</text>
</svg>
