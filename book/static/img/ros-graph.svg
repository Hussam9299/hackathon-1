<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Nodes -->
  <rect x="50" y="50" width="100" height="50" fill="#add8e6" stroke="black" />
  <text x="75" y="80">/camera</text>
  <rect x="250" y="50" width="100" height="50" fill="#add8e6" stroke="black" />
  <text x="260" y="80">/image_processor</text>

  <!-- Topic -->
  <ellipse cx="200" cy="150" rx="60" ry="20" fill="#90ee90" stroke="black" />
  <text x="175" y="155">/image_raw</text>

  <!-- Arrows -->
  <line x1="100" y1="100" x2="170" y2="140" stroke="black" marker-end="url(#arrow)" />
  <line x1="230" y1="140" x2="300" y2="100" stroke="black" marker-end="url(#arrow)" />

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
        markerWidth="6" markerHeight="6"
        orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>
</svg>
