<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .layer {
      stroke: #333;
      stroke-width: 2;
      fill-opacity: 0.9;
    }
    .text {
      font-family: Arial, sans-serif;
      font-size: 20px;
      text-anchor: middle;
      fill: #fff;
    }
    .arrow {
      fill: #333;
    }
  </style>

  <rect x="50" y="300" width="500" height="80" rx="10" ry="10" class="layer" style="fill: #76B900;" />
  <text x="300" y="345" class="text">NVIDIA Omniverse</text>

  <rect x="100" y="200" width="400" height="80" rx="10" ry="10" class="layer" style="fill: #F6921E;" />
  <text x="300" y="245" class="text">NVIDIA PhysX 5</text>

  <rect x="150" y="100" width="300" height="80" rx="10" ry="10" class="layer" style="fill: #00AEEF;" />
  <text x="300" y="145" class="text">Isaac Sim Robotics Apps</text>

  <path d="M 300 280 L 300 200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 300 180 L 300 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>
</svg>
