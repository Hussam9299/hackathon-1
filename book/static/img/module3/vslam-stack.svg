<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node {
      stroke: #333;
      stroke-width: 2;
      fill: #00AEEF;
      rx: 10;
      ry: 10;
    }
    .text {
      font-family: Arial, sans-serif;
      font-size: 16px;
      text-anchor: middle;
      fill: #fff;
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-anchor: middle;
      fill: #333;
    }
    .arrow {
      stroke: #333;
      stroke-width: 2;
      marker-end: url(#arrowhead);
    }
  </style>

  <rect x="50" y="100" width="150" height="60" class="node" />
  <text x="125" y="135" class="text">Camera Node</text>

  <rect x="250" y="100" width="150" height="60" class="node" />
  <text x="325" y="135" class="text">Rectify Node</text>

  <rect x="450" y="100" width="150" height="60" class="node" />
  <text x="525" y="135" class="text">Feature Tracker</text>

  <rect x="650" y="100" width="100" height="60" class="node" />
  <text x="700" y="135" class="text">VSLAM</text>
  
  <line x1="200" y1="130" x2="250" y2="130" class="arrow" />
  <text x="225" y="120" class="label">Image</text>

  <line x1="400" y1="130" x2="450" y2="130" class="arrow" />
  <text x="425" y="120" class="label">Rect. Image</text>

  <line x1="600" y1="130" x2="650" y2="130" class="arrow" />
  <text x="625" y="120" class="label">Features</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
